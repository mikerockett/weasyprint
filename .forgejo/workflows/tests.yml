name: Run Tests

on: [pull_request]

jobs:
  test:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']
        weasyprint-version: ['67.0', '68.0']
        composer-flags: ['']
        include:
          - php-version: '8.3'
            weasyprint-version: '67.0'
            composer-flags: '--prefer-lowest --prefer-stable'
    runs-on: ubuntu-latest
    container:
      image: php:${{ matrix.php-version }}-cli-alpine
    steps:
      - name: Install system dependencies
        run: apk -q add git nodejs py3-pip py3-pillow py3-cffi py3-brotli gcc musl-dev python3-dev pango fontconfig-dev font-noto

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for skip tests
        id: skip
        run: |
          MESSAGE=$(git log -1 --format=%s)
          if echo "$MESSAGE" | grep -qF '[skip tests]'; then
            echo "skip=true" >> "$FORGEJO_OUTPUT"
          fi

      - name: Install Composer
        if: steps.skip.outputs.skip != 'true'
        run: curl -sS https://getcomposer.org/installer | php

      - name: Restore cached vendor directory
        if: steps.skip.outputs.skip != 'true' && matrix.composer-flags == ''
        uses: actions/cache@v4
        with:
          path: vendor/
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        if: steps.skip.outputs.skip != 'true'
        run: |
          if [ -n "${{ matrix.composer-flags }}" ]; then
            php composer.phar update -qo ${{ matrix.composer-flags }}
          else
            php composer.phar install -qo
          fi

      - name: Run Mago lint
        if: steps.skip.outputs.skip != 'true'
        run: ./vendor/bin/mago lint

      - name: Run Mago analyze
        if: steps.skip.outputs.skip != 'true'
        run: ./vendor/bin/mago analyze

      - name: Install and verify WeasyPrint
        if: steps.skip.outputs.skip != 'true'
        run: pip3 -q install weasyprint==${{ matrix.weasyprint-version }} --break-system-packages && weasyprint --info

      - name: Run tests
        if: steps.skip.outputs.skip != 'true'
        run: ./vendor/bin/pest --profile
